name: Release

on:
  push:
    tags:
      - v*.*.*
  workflow_dispatch:
    inputs:
      version:
        description: Existing package.json version to release, for example 0.1.0. Leave empty to use package.json.
        required: false
        type: string
      publish_marketplace:
        description: Publish to Visual Studio Marketplace when VSCE_PAT is configured.
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and Publish
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      PUBLISH_MARKETPLACE: ${{ github.event_name == 'push' || github.event.inputs.publish_marketplace == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Inspect extension toolchain
        run: ./plsr doctor

      - name: Resolve release version
        id: version
        run: |
          package_version="$(./plsr versions current)"
          requested_version="${{ github.event.inputs.version || '' }}"

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
            if [ "$tag" = "$version" ]; then
              echo "Expected release tag to start with v, got $tag" >&2
              exit 1
            fi
            if [ "$version" != "$package_version" ]; then
              echo "Tag $tag does not match package.json version $package_version" >&2
              exit 1
            fi
          else
            version="${requested_version:-$package_version}"
            tag="v${version}"
            if [ "$version" != "$package_version" ]; then
              echo "Requested version $version does not match package.json version $package_version" >&2
              exit 1
            fi
          fi

          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release version must be semver x.y.z, got $version" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Run release gate
        run: ./plsr ci release-gate

      - name: Package VSIX
        run: ./plsr package --skip-check

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: voidslate-${{ steps.version.outputs.version }}-vsix
          path: dist/*.vsix
          if-no-files-found: error

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.version.outputs.tag }}"
          vsix="dist/voidslate-${{ steps.version.outputs.version }}.vsix"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$vsix" --clobber
          else
            gh release create "$tag" "$vsix" --title "VoidSlate $tag" --target "$GITHUB_SHA" --generate-notes
          fi

      - name: Publish to Visual Studio Marketplace
        if: ${{ env.VSCE_PAT != '' && env.PUBLISH_MARKETPLACE == 'true' }}
        run: |
          npx --yes @vscode/vsce publish --packagePath "dist/voidslate-${{ steps.version.outputs.version }}.vsix" -p "$VSCE_PAT"
